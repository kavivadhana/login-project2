<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN UP</title>
    <style>
        body{
            background:linear-gradient(to right,rgb(197, 255, 243),plum);
            display:flex;
            justify-content: center;
            align-items: center;
            margin:60px;
        }
        .demo{
            background:white;
            margin:50px 30px;
            height:340px;
           
            width:250px;
            border-radius:25px;
            padding:20px;
            right:60px;

        }
        button{
            padding:15px;
            color:white;
            background:linear-gradient(to right,#1a73e8,#0d47a1);
            border:none;
            border-radius:6px;
            width:90%;
        }
        input{
            width:92%;
    padding:6px;
    border:1px solid #e0e0e0;
    border-radius:5px;
    outline:none;

        }
        button:hover{
            background:linear-gradient(to right,rgb(72, 82, 232),rgb(36, 46, 184));
        }
        h2{
            font-size:20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="demo">
    <form class="id">
        <h1>SignUp</h1>
        <input type="text" name="fname" id="fname" placeholder="firstname"><br><br>
        <input type="email" name="email" id="email" placeholder="email"><br><br>
        <input type="password" name="password" id="password" placeholder="password"><br><br>
        <button type="button" onclick="validateForm()">Sign up</button><br><br>
        <p>Already have an account? <a href="#" onclick="goToLogin()">Log in</a></p>
    </form>
    </div>
</body>
<script>
    function goToLogin(){ 
        window.location.href="sam.html";
       
    }
    function validateForm(){
        let fname=document.getElementById("fname").value;
        let email=document.getElementById("email").value;
        let password=document.getElementById("password").value;
        if(fname=="" || email=="" || password==""){
            alert("please fill all the fields");
        }
        else{
            alert("Registered Successfully");
        }

    }
</script>
</html>
