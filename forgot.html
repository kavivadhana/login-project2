<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>password confirmation</title>
    <style>
        body{
            background:linear-gradient(to right,rgb(197, 255, 243),plum);
            display:flex;
            justify-content: center;
            margin:100px;
        }
        .id{
            background:white;
            border-radius:25px;
            padding:20px;
            width:250px;
        }
        input{
            border-radius:5px;
            border:1px solid 
            rgb(223, 199, 199);
            padding:6px;
        }
        button{
            padding:12px;
            width:90%;
            background:linear-gradient(to right,#1a73e8,#0d47a1);
            border:none;
            border-radius:10px;
            color:white;

        }
        button:hover{
            background:linear-gradient(to right,rgb(72, 82, 232),rgb(36, 46, 184));
        }
    </style>
</head>
<body>
    <div class="id">
    <form>
        <h1>Reset password</h1>
        <input type="password" id="password" name="password" placeholder="password"><br><br>
        <input type="password" id="Reset" name="Reset" placeholder="Confirm password">
        <br><br>
        <button type="button" onclick="goToLogin()">Confirm</button>
    </form>
    </div>
</body>
<script>
    function goToLogin(){
        let pass=document.getElementById("password").value;
        let confirmpass=document.getElementById("Reset").value;
        if(pass=="" || confirmpass==""){
            alert("Please enter password in both fields");
        }
        else if( pass!="" && pass===confirmpass){
            alert("Password matched");
            window.location.href="sam.html";
        }
        else{
            alert("Passwords do not match");
        }
    }

</script>

</html>
