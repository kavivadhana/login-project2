<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <style >
        body{
             background: linear-gradient(to right,rgb(197, 255, 243),plum);
             justify-content:center;
   align-items:center;
   display:flex;
     
             
             
}
.demo{
    background-color: white;
    width:250px;
    height:300px;
   
 margin:100px ;
  box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
   border-radius:15px;
   padding:50px 30px;


}
a{
    text-decoration: none;
}
.logo{
    padding:10px 80px;
    text-align: center;

    width:100%;
    border:none;
    border-radius: 5px;
    background:linear-gradient(to right,rgb(68, 89, 222),rgb(53, 30, 120)) ;
    color:white;
    font-size:16px;
}
input{
    width:100%;
    padding:6px;
    border:1px solid #e0e0e0;
    border-radius:5px;
    outline:none;
}
.active{
    display:flex;
    width:100%;
    height:50px;
    background:#fff;
    border:1px solid #e0e0e0;
    border-radius: 30px;
    margin-bottom:25px;
    overflow:hidden;
    position:relative;

}
.active button{
    flex:1;
    border:none;
    background:transparent;
    cursor:pointer;
    font-size:16px;
    z-index:1;
}
.slider{
    position:absolute;
    width:50%;
    height:100%;
    background:linear-gradient(to right,#1a73e8,#0d47a1);
    border-radius:30px;
    transition:0.3s;
    left:0;
    z-index:0;
}



    </style>
</head>
<body>
    <div class="demo">
    <form>
        <h1> Login Form</h1>
        <div class="active">
            <div id="slider" class="slider"></div>
        <button  type="button" class="login" onclick="showLogin()"> login</button>
        <button type="button" class="signup" onclick="showSignup()">signup</button><br><br>
        
        </div>

        <input type="email" name="email" id="email" placeholder="enter you email" ><br><br>
        <input type="password" name="password" id="password" placeholder="enter your password"><br>
        <a href="#" onclick="goToForgot()">Forgot Password?</a><br>
        <br>
        <button class="logo">Login</button>
        <p>Create an account 
        <a href="#" onclick="goToSignup()">Signup now</a></p>
    </form>
    </div>
</body>
<script>
    function goToSignup(){
        window.location.href="signup.html";
    }
    function goToForgot(){
        window.location.href="forgot.html";
    }
    function showSignup(){
        document.getElementById("slider").style.left="50%";

    }
    function showLogin(){
        document.getElementById("slider").style.left="0%";
    }
</script>
</html>
